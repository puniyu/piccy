name: release
on:
  push:
    branches:
      - main
  pull_request_target:
    branches-ignore:
      - 'release-please**'
  workflow_dispatch:

env:
  APP_NAME: piccy

permissions:
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  release:
    if: "!startsWith(github.head_ref, 'release-please')"
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.release-please.outputs['piccy_core--release_created'] }}
      app: ${{ steps.release-please.outputs['piccy_app--release_created'] }}
      app_tag_name: ${{ steps.release-please.outputs['piccy_app--tag_name'] }}
      node: ${{ steps.release-please.outputs['piccy_node--release_created'] }}
      node_tag_name: ${{ steps.release-please.outputs['piccy_node--tag_name'] }}
    steps:
      - name: 获取token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 运行 release-please-action
        id: release-please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-crates-io:
    needs: release
    runs-on: ubuntu-latest
    if: needs.release.outputs.core
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 设置 rust
        uses: puniyu/setup-rust@36710db2069c5dbcd0bc48cf725ad62ece8bff77 # main
        with:
          save-cache: true
          prefix-key: ${{ env.APP_NAME }}
          tools: tauri-cli

      - name: 发布piccy_core
        run: |
          cargo publish --package piccy_core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_TOKEN }}

  build-tauri-app:
    needs: release
    uses: ./.github/workflows/build-tauri-app.yaml
    secrets: inherit


  publish-tauri-app:
    needs: [ build-tauri-app, release ]
    if : needs.release.outputs.app
    runs-on: ubuntu-latest
    steps:
      - name: 获取token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 下载构建产物
        uses: dawidd6/action-download-artifact@ac66b43f0e6a346234dd65d4d0c8fbb31cb316e5 # v11
        with:
          name: ^piccy-app.*
          name_is_regexp: true
          skip_unpack: true

      - name: 上传Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          files: |
            piccy-app-*
          tag_name: ${{ needs.release.outputs.app_tag_name }}

  build-npm-lib:
    if: needs.release.outputs.node
    needs: release
    uses: ./.github/workflows/build-npm-lib.yaml

  publish-npm-lib:
    needs: [ build-npm-lib, release ]
    if: needs.release.outputs.node
    runs-on: ubuntu-latest
    steps:
      - name: 获取token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 下载npm包
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: "npm-package"
          path: piccy-node

      - name: 下载wasm包
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: "npm-wasm"
          path: piccy-node

      - name: 下载构建产物
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: piccy-node*
          path: piccy-node/artifacts

      - name: Setup Nodejs
        uses: puniyu/setup-node@c1faa989016842e46ed5c17e667d00f4e00d4225 # main
        with:
          node-version: lts/*
          pnpm-version: 10.25.0
          cache: true

      - name: 发布npm包
        run: |
          pnpm install
          pnpm config set provenance true
          pnpm config set registry https://registry.npmjs.org/
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
          pnpm run create-npm-dirs
          pnpm run artifacts
          pnpm publish --access public
        working-directory: piccy-node
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 上传Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          files: |
            piccy-node/artifacts/piccy-node-*/piccy*.node
            piccy-node/artifacts/piccy-node-*/piccy*.wasm
          tag_name: ${{ needs.release.outputs.node_tag_name }}